{% extends 'base.html' %}

{% block content %}

<div class="card shadow">
    <div class="card-header bg-primary text-white">
        <h4>Add New Room</h4>
    </div>

    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success">Save Room</button>
        </form>
    </div>
</div>

{% endblock %}
