{% extends 'base.html' %}

{% block content %}

<h3>Search Rooms</h3>

<form method="GET" class="mb-4">
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Search</button>
</form>

<table class="table table-bordered">
    <tr>
        <th>Room No</th>
        <th>Capacity</th>
        <th>AC</th>
        <th>Washroom</th>
    </tr>

    {% for room in rooms %}
    <tr>
        <td>{{ room.room_no }}</td>
        <td>{{ room.capacity }}</td>
        <td>{{ room.has_ac }}</td>
        <td>{{ room.has_attached_washroom }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No rooms found</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
